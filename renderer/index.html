<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lens</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">

    <!-- Titlebar -->
    <div id="titlebar">
      <div id="drag-handle">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1L13 7L7 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M1 7H13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Lens</span>
      </div>
      <div id="titlebar-right">
        <div id="provider-badge"></div>
        <button id="settings-btn" title="Settings" aria-label="Settings">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <button id="close-btn" title="Close" aria-label="Close">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mode pills -->
    <div id="mode-bar">
      <button class="mode-pill active" data-mode="simplify">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Simplify
      </button>
      <button class="mode-pill" data-mode="translate">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg>
        Translate
      </button>
      <button class="mode-pill" data-mode="summarize">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Summarize
      </button>
      <button class="mode-pill" data-mode="define">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Define
      </button>
    </div>

    <!-- Main content -->
    <div id="content">

      <!-- Idle -->
      <div id="idle-state">
        <div id="scan-area-frame">
          <span class="scan-corner-tr"></span>
          <span class="scan-corner-bl"></span>
        </div>
        <span id="scan-area-label">Scan area</span>
        <div id="idle-icon">
          <div class="idle-ring ring1"></div>
          <div class="idle-ring ring2"></div>
          <div class="idle-ring ring3"></div>
          <svg class="idle-eye" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <p class="idle-title">Position over any text</p>
        <p class="idle-hint">Press <kbd>⌘ Shift L</kbd> or click Scan</p>
        <button id="scan-btn-main">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Scan
        </button>
      </div>

      <!-- Loading -->
      <div id="loading-state" class="hidden">
        <div id="loading-visual">
          <div class="pulse-ring"></div>
          <div class="pulse-ring delay1"></div>
          <div class="pulse-ring delay2"></div>
        </div>
        <p id="loading-label">Capturing text…</p>
        <p id="loading-sub">Running OCR</p>
      </div>

      <!-- Result -->
      <div id="result-state" class="hidden">
        <div id="result-header">
          <button id="copy-btn" title="Copy result">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
        </div>
        <div class="tab-content">
          <p id="result-text"></p>
        </div>
        <div id="result-footer">
          <button id="rescan-btn">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
            Scan again
          </button>
        </div>
      </div>

      <!-- Error -->
      <div id="error-state" class="hidden">
        <div id="error-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <p id="error-text"></p>
        <div id="error-actions">
          <button id="open-settings-from-error" class="ghost-btn">Open Settings</button>
          <button id="retry-btn" class="ghost-btn">Try Again</button>
        </div>
      </div>

    </div>

    <!-- Scan button (bottom bar) -->
    <div id="bottom-bar">
      <button id="scan-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Scan
      </button>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel" class="hidden">
      <div id="settings-header">
        <div id="settings-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          Settings
        </div>
        <button id="settings-close-btn" aria-label="Close settings">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>
          </svg>
        </button>
      </div>

      <div id="settings-body">

        <!-- Provider cards -->
        <p class="settings-section-label">AI Provider</p>
        <div id="provider-cards">
          <button class="provider-card active" data-provider="openai">
            <span class="provider-icon">⬡</span>
            <span class="provider-name">OpenAI</span>
          </button>
          <button class="provider-card" data-provider="anthropic">
            <span class="provider-icon">◈</span>
            <span class="provider-name">Claude</span>
          </button>
          <button class="provider-card" data-provider="ollama">
            <span class="provider-icon">◎</span>
            <span class="provider-name">Ollama</span>
            <span class="provider-tag">Local</span>
          </button>
        </div>

        <!-- OpenAI -->
        <div class="provider-section" id="section-openai">
          <div class="field-group">
            <label>API Key</label>
            <div class="input-wrap">
              <input type="password" id="s-openai-key" placeholder="sk-..." autocomplete="off"/>
              <button class="reveal-btn" data-target="s-openai-key" aria-label="Toggle visibility">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="field-group">
            <label>Model</label>
            <input type="text" id="s-openai-model" placeholder="gpt-4o"/>
          </div>
        </div>

        <!-- Anthropic -->
        <div class="provider-section hidden" id="section-anthropic">
          <div class="field-group">
            <label>API Key</label>
            <div class="input-wrap">
              <input type="password" id="s-anthropic-key" placeholder="sk-ant-..." autocomplete="off"/>
              <button class="reveal-btn" data-target="s-anthropic-key" aria-label="Toggle visibility">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>
          <div class="field-group">
            <label>Model</label>
            <input type="text" id="s-anthropic-model" placeholder="claude-3-5-haiku-20241022"/>
          </div>
        </div>

        <!-- Ollama -->
        <div class="provider-section hidden" id="section-ollama">
          <div class="field-group">
            <label>Base URL</label>
            <input type="text" id="s-ollama-url" placeholder="http://localhost:11434"/>
          </div>
          <div class="field-group">
            <label>Model</label>
            <input type="text" id="s-ollama-model" placeholder="llama3.2"/>
          </div>
          <p class="field-hint">Run <code>ollama pull llama3.2</code> to get started. <a href="https://ollama.com" target="_blank">ollama.com ↗</a></p>
        </div>

        <div class="settings-divider"></div>

        <!-- Prompts -->
        <p class="settings-section-label">
          Custom Prompts
          <span class="label-hint">use <code>{text}</code> as placeholder</span>
        </p>
        <div id="prompt-tabs">
          <button class="ptab active" data-mode="simplify">Simplify</button>
          <button class="ptab" data-mode="translate">Translate</button>
          <button class="ptab" data-mode="summarize">Summarize</button>
          <button class="ptab" data-mode="define">Define</button>
        </div>
        <textarea id="s-prompt" rows="4" spellcheck="false"></textarea>

        <div id="settings-actions">
          <button id="reset-prompt-btn" class="ghost-btn">Reset</button>
          <button id="save-settings-btn">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            Save
          </button>
        </div>

      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
